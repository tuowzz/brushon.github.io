<style>
body{font-family:Kanit;margin:0;background:#fafafa;}
.container{padding:15px;}
.price{color:#ff2d55;font-size:28px;font-weight:800;}
.old{color:#999;text-decoration:line-through;margin-left:10px;}

<body>

<div class="container">

<h1>💗 บลัชออนตลับ M-BLITHE</h1>
<p>ปัดแล้วหน้าเด็กทันที ละมุนเหมือนใส่ฟิลเตอร์</p>

<img src="blush1.jpg" style="width:100%;border-radius:12px;">

<div style="margin-top:15px;">
<span class="price">฿259</span>
<span class="old">฿390</span>
</div>

<h3>✨ จุดเด่น</h3>
<ul>
<li>ปัดแล้วหน้าไบรท์ทันที</li>
<li>สีละมุน ไม่เป็นคราบ</li>
<li>เหมาะกับทุกสีผิว</li>
<li>ถ่ายรูปขึ้นกล้อง</li>
</ul>

<h3>เลือกสี</h3>
<select id="shade">
<option value="01 Baby Pink - 259">01 Baby Pink</option>
<option value="02 Peach Glow - 259">02 Peach Glow</option>
<option value="03 Rose Mood - 259">03 Rose Mood</option>
<option value="04 Nude Soft - 259">04 Nude Soft</option>
</select>

<h3>กรอกข้อมูล</h3>
<input id="name" placeholder="ชื่อ" style="width:100%;padding:10px;margin-bottom:10px;">
<input id="phone" placeholder="เบอร์" style="width:100%;padding:10px;margin-bottom:10px;">
<textarea id="addr" placeholder="ที่อยู่" style="width:100%;padding:10px;"></textarea>

<button class="btn" onclick="order()">สั่งซื้อเลย</button>

</div>

<script>
const URL="https://script.google.com/macros/s/AKfycbzBFS1zxkrbiOpcP-1wYxALRfU3wJprPRT9KJju2wWEY2Rdd7OnJbFDTCErH-amUZrO/exec";

function order(){

let data=new FormData();
data.append("product",document.getElementById("shade").value);
data.append("name",document.getElementById("name").value);
data.append("phone",document.getElementById("phone").value);
data.append("address",document.getElementById("addr").value);
data.append("price","259");

fetch(URL,{method:"POST",body:data})
.then(r=>r.json())
.then(d=>{
alert("สั่งซื้อสำเร็จ");

fbq('track','Purchase',{value:259,currency:'THB'});
ttq.track('CompletePayment',{value:259});
gtag('event','conversion',{
'send_to':'AW-17035064059',
'value':259,
'currency':'THB'
});

});
}
</script>
